# Optional HTTPS block for api.mainmarket.org — enable ONLY after:
#   test -f /etc/letsencrypt/live/api.mainmarket.org/fullchain.pem
# Append to sites-available/api.mainmarket.org or include from main config.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mainmarket.org;

    ssl_certificate /etc/letsencrypt/live/api.mainmarket.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mainmarket.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/school_management_system/backend-laravel/public;
    index index.php;
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# After enabling HTTPS, add HTTP → HTTPS redirect in the port-80 server block:
#   location / { return 301 https://$host$request_uri; }
