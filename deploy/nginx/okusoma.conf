# okusoma.com — React static site + Laravel API (same origin /api)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name okusoma.com www.okusoma.com;

    ssl_certificate /etc/letsencrypt/live/okusoma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/okusoma.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/okusoma;
    index index.html;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location ^~ /api/ {
        # Laravel 7.x on this VPS must stay on PHP 7.4 (PHP 8.3 breaks Illuminate\Collection).
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/school_management_system/backend-laravel/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/school_management_system/backend-laravel/public;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        include fastcgi_params;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
        # Avoid buffering large auth JSON on slow clients.
        fastcgi_buffering on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ^~ /storage/ {
        alias /var/www/school_management_system/backend-laravel/storage/app/public/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Hashed assets can be cached; HTML must always revalidate so login fixes ship.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name okusoma.com www.okusoma.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
