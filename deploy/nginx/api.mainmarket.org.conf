# api.mainmarket.org — Laravel API (ASSMS backend)
#
# IMPORTANT: Use this HTTP-only config until certbot succeeds:
#   sudo certbot certonly --webroot -w /var/www/letsencrypt -d api.mainmarket.org
# Then enable deploy/nginx/api.mainmarket.org.ssl.conf snippet.
#
# Never deploy the SSL block without a valid cert — a failed nginx -t takes ALL sites offline on reboot.

server {
    listen 80;
    listen [::]:80;
    server_name api.mainmarket.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        allow all;
    }

    root /var/www/school_management_system/backend-laravel/public;
    index index.php;
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
